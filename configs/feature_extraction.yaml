# Feature Extraction Configuration
# SC 2026: ML+LLM Hybrid for HPC I/O Bottleneck Detection
#
# Defines ALL features extracted from Darshan logs.
# The authoritative feature lists are in src/data/feature_extraction.py.
# This config serves as documentation and reference for the feature set.
#
# IMPORTANT: No features are excluded here.  Feature selection is deferred
# to the preprocessing stage (configs/preprocessing.yaml) and driven by
# EDA (statistical analysis of the raw feature distribution).

# --- Job Metadata (2 features) ---
job_metadata:
  - nprocs
  - runtime_seconds

# --- POSIX Module (always present, 86 counters) ---
posix:
  # Operation counts (SUM aggregation)
  operations:
    - POSIX_OPENS
    - POSIX_FILENOS
    - POSIX_DUPS
    - POSIX_READS
    - POSIX_WRITES
    - POSIX_SEEKS
    - POSIX_STATS
    - POSIX_MMAPS
    - POSIX_FSYNCS
    - POSIX_FDSYNCS
    - POSIX_RENAME_SOURCES
    - POSIX_RENAME_TARGETS
    - POSIX_RW_SWITCHES

  # Byte counters (SUM / MAX aggregation)
  bytes:
    - POSIX_BYTES_READ
    - POSIX_BYTES_WRITTEN
    - POSIX_MAX_BYTE_READ
    - POSIX_MAX_BYTE_WRITTEN

  # Access pattern counters (SUM)
  patterns:
    - POSIX_CONSEC_READS
    - POSIX_CONSEC_WRITES
    - POSIX_SEQ_READS
    - POSIX_SEQ_WRITES

  # Alignment (SUM for NOT_ALIGNED; LAST_VALUE for ALIGNMENT constants)
  alignment:
    - POSIX_MEM_NOT_ALIGNED
    - POSIX_MEM_ALIGNMENT
    - POSIX_FILE_NOT_ALIGNED
    - POSIX_FILE_ALIGNMENT

  # Read size histogram — 10 bins (SUM)
  size_read_histogram:
    - POSIX_SIZE_READ_0_100
    - POSIX_SIZE_READ_100_1K
    - POSIX_SIZE_READ_1K_10K
    - POSIX_SIZE_READ_10K_100K
    - POSIX_SIZE_READ_100K_1M
    - POSIX_SIZE_READ_1M_4M
    - POSIX_SIZE_READ_4M_10M
    - POSIX_SIZE_READ_10M_100M
    - POSIX_SIZE_READ_100M_1G
    - POSIX_SIZE_READ_1G_PLUS

  # Write size histogram — 10 bins (SUM)
  size_write_histogram:
    - POSIX_SIZE_WRITE_0_100
    - POSIX_SIZE_WRITE_100_1K
    - POSIX_SIZE_WRITE_1K_10K
    - POSIX_SIZE_WRITE_10K_100K
    - POSIX_SIZE_WRITE_100K_1M
    - POSIX_SIZE_WRITE_1M_4M
    - POSIX_SIZE_WRITE_4M_10M
    - POSIX_SIZE_WRITE_10M_100M
    - POSIX_SIZE_WRITE_100M_1G
    - POSIX_SIZE_WRITE_1G_PLUS

  # Top-4 access sizes (TOP-4 MERGE aggregation)
  access_sizes:
    - POSIX_ACCESS1_ACCESS
    - POSIX_ACCESS2_ACCESS
    - POSIX_ACCESS3_ACCESS
    - POSIX_ACCESS4_ACCESS
    - POSIX_ACCESS1_COUNT
    - POSIX_ACCESS2_COUNT
    - POSIX_ACCESS3_COUNT
    - POSIX_ACCESS4_COUNT

  # Top-4 strides (TOP-4 MERGE aggregation)
  strides:
    - POSIX_STRIDE1_STRIDE
    - POSIX_STRIDE2_STRIDE
    - POSIX_STRIDE3_STRIDE
    - POSIX_STRIDE4_STRIDE
    - POSIX_STRIDE1_COUNT
    - POSIX_STRIDE2_COUNT
    - POSIX_STRIDE3_COUNT
    - POSIX_STRIDE4_COUNT

  # Rank imbalance (CONDITIONAL — sentinel -1 if not shared file)
  rank_imbalance:
    - POSIX_FASTEST_RANK
    - POSIX_FASTEST_RANK_BYTES
    - POSIX_SLOWEST_RANK
    - POSIX_SLOWEST_RANK_BYTES
    - POSIX_MAX_READ_TIME_SIZE
    - POSIX_MAX_WRITE_TIME_SIZE

  # File metadata (LAST_VALUE — not meaningful as aggregate, kept for EDA)
  file_metadata:
    - POSIX_MODE
    - POSIX_RENAMED_FROM

  # Timing — cumulative I/O times (SUM, seconds)
  timing:
    - POSIX_F_READ_TIME
    - POSIX_F_WRITE_TIME
    - POSIX_F_META_TIME
    - POSIX_F_MAX_READ_TIME
    - POSIX_F_MAX_WRITE_TIME

  # Timestamps — absolute UNIX times (MIN_NONZERO / MAX)
  timestamps:
    - POSIX_F_OPEN_START_TIMESTAMP
    - POSIX_F_READ_START_TIMESTAMP
    - POSIX_F_WRITE_START_TIMESTAMP
    - POSIX_F_CLOSE_START_TIMESTAMP
    - POSIX_F_OPEN_END_TIMESTAMP
    - POSIX_F_READ_END_TIMESTAMP
    - POSIX_F_WRITE_END_TIMESTAMP
    - POSIX_F_CLOSE_END_TIMESTAMP

  # Rank time imbalance (CONDITIONAL — 0.0 if not shared)
  rank_timing:
    - POSIX_F_FASTEST_RANK_TIME
    - POSIX_F_SLOWEST_RANK_TIME

  # Variance (ZEROED in v3.5.0 --total)
  variance:
    - POSIX_F_VARIANCE_RANK_TIME
    - POSIX_F_VARIANCE_RANK_BYTES

# --- MPI-IO Module (present for MPI-parallel jobs, 33 counters) ---
mpiio:
  operations:
    - MPIIO_INDEP_OPENS
    - MPIIO_COLL_OPENS
    - MPIIO_INDEP_READS
    - MPIIO_INDEP_WRITES
    - MPIIO_COLL_READS
    - MPIIO_COLL_WRITES
    - MPIIO_SPLIT_READS
    - MPIIO_SPLIT_WRITES
    - MPIIO_NB_READS
    - MPIIO_NB_WRITES
    - MPIIO_SYNCS
    - MPIIO_HINTS
    - MPIIO_VIEWS
  bytes:
    - MPIIO_BYTES_READ
    - MPIIO_BYTES_WRITTEN
  rw_switches:
    - MPIIO_RW_SWITCHES
  access_sizes:
    - MPIIO_ACCESS1_ACCESS
    - MPIIO_ACCESS2_ACCESS
    - MPIIO_ACCESS3_ACCESS
    - MPIIO_ACCESS4_ACCESS
    - MPIIO_ACCESS1_COUNT
    - MPIIO_ACCESS2_COUNT
    - MPIIO_ACCESS3_COUNT
    - MPIIO_ACCESS4_COUNT
  timing:
    - MPIIO_F_READ_TIME
    - MPIIO_F_WRITE_TIME
    - MPIIO_F_META_TIME
    - MPIIO_F_MAX_READ_TIME
    - MPIIO_F_MAX_WRITE_TIME
  rank_timing:
    - MPIIO_F_FASTEST_RANK_TIME
    - MPIIO_F_SLOWEST_RANK_TIME
  variance:
    - MPIIO_F_VARIANCE_RANK_TIME
    - MPIIO_F_VARIANCE_RANK_BYTES

# --- STDIO Module (present for C stdio usage, 17 counters) ---
stdio:
  operations:
    - STDIO_OPENS
    - STDIO_FDOPENS
    - STDIO_READS
    - STDIO_WRITES
    - STDIO_SEEKS
    - STDIO_FLUSHES
  bytes:
    - STDIO_BYTES_READ
    - STDIO_BYTES_WRITTEN
    - STDIO_MAX_BYTE_READ
    - STDIO_MAX_BYTE_WRITTEN
  timing:
    - STDIO_F_READ_TIME
    - STDIO_F_WRITE_TIME
    - STDIO_F_META_TIME
  rank_timing:
    - STDIO_F_FASTEST_RANK_TIME
    - STDIO_F_SLOWEST_RANK_TIME
  variance:
    - STDIO_F_VARIANCE_RANK_TIME
    - STDIO_F_VARIANCE_RANK_BYTES

# --- Module Indicators (8 binary features) ---
indicators:
  - has_posix
  - has_mpiio
  - has_stdio
  - has_hdf5
  - has_pnetcdf
  - has_apmpi
  - has_heatmap
  - is_shared_file

# --- Derived Features (39 features) ---
# Computed from raw counters during feature engineering (Stage 3)
derived:
  bandwidth:
    - read_bw_mb_s          # POSIX_BYTES_READ / max(POSIX_F_READ_TIME, eps) / 1e6
    - write_bw_mb_s         # POSIX_BYTES_WRITTEN / max(POSIX_F_WRITE_TIME, eps) / 1e6
    - total_bw_mb_s         # (BYTES_READ + BYTES_WRITTEN) / max(total_io_time, eps) / 1e6

  read_write_balance:
    - read_ratio            # bytes_read / max(total_bytes, 1)

  size_ratios:
    - avg_read_size         # POSIX_BYTES_READ / max(POSIX_READS, 1)
    - avg_write_size        # POSIX_BYTES_WRITTEN / max(POSIX_WRITES, 1)
    - small_read_ratio      # (SIZE_READ_0_100 + SIZE_READ_100_1K) / max(READS, 1)
    - small_write_ratio     # (SIZE_WRITE_0_100 + SIZE_WRITE_100_1K) / max(WRITES, 1)
    - small_io_ratio        # combined small reads + writes / total ops
    - medium_read_ratio     # (SIZE_READ_1K_10K + ... + 100K_1M) / max(READS, 1)
    - medium_write_ratio    # (SIZE_WRITE_1K_10K + ... + 100K_1M) / max(WRITES, 1)
    - large_read_ratio      # (SIZE_READ_1M_4M + ... + 1G_PLUS) / max(READS, 1)
    - large_write_ratio     # (SIZE_WRITE_1M_4M + ... + 1G_PLUS) / max(WRITES, 1)

  pattern_ratios:
    - seq_read_ratio        # POSIX_SEQ_READS / max(POSIX_READS, 1)
    - seq_write_ratio       # POSIX_SEQ_WRITES / max(POSIX_WRITES, 1)
    - consec_read_ratio     # POSIX_CONSEC_READS / max(POSIX_READS, 1)
    - consec_write_ratio    # POSIX_CONSEC_WRITES / max(POSIX_WRITES, 1)
    - rw_ratio              # READS / max(WRITES, 1)
    - rw_switch_ratio       # RW_SWITCHES / max(total_ops, 1)

  alignment_ratios:
    - mem_misalign_ratio    # MEM_NOT_ALIGNED / max(total_ops, 1)
    - file_misalign_ratio   # FILE_NOT_ALIGNED / max(total_ops, 1)

  metadata_ratios:
    - metadata_time_ratio   # F_META_TIME / max(total_time, eps)
    - read_time_fraction    # F_READ_TIME / max(total_time, eps)
    - write_time_fraction   # F_WRITE_TIME / max(total_time, eps)
    - opens_per_op          # OPENS / max(total_ops, 1)
    - stats_per_op          # STATS / max(total_ops, 1)
    - seeks_per_op          # SEEKS / max(total_ops, 1)
    - fsync_ratio           # FSYNCS / max(WRITES, 1)
    - opens_per_mb          # OPENS / max(total_bytes / 1e6, eps)

  imbalance_ratios:
    - rank_bytes_cv         # sqrt(VARIANCE_RANK_BYTES) / max(mean_bytes, eps)
    - rank_time_cv          # sqrt(VARIANCE_RANK_TIME) / max(mean_time, eps)
    - byte_imbalance        # (SLOWEST_BYTES - FASTEST_BYTES) / max(total_bytes, eps)
    - time_imbalance        # (SLOWEST_TIME - FASTEST_TIME) / max(total_time, eps)

  mpiio_ratios:
    - collective_ratio      # (COLL_READS + COLL_WRITES) / max(total_mpiio_ops, 1)
    - nonblocking_ratio     # (NB_READS + NB_WRITES) / max(total_mpiio_ops, 1)

  temporal:
    - io_duration           # close_end_timestamp - open_start_timestamp
    - io_active_fraction    # total_io_time / max(runtime, eps)

  access_concentration:
    - access_size_concentration  # ACCESS1_COUNT / max(total_ops, 1)
    - dominant_access_size       # ACCESS1_ACCESS (most common size)

  file_count:
    - num_files             # count of unique file records

# --- Info Columns (not features, carried for identification) ---
info_columns:
  - _jobid
  - _uid
  - _start_time
  - _end_time
  - _modules
  - _uses_lustre
  - _log_version
  - _lustre_mount

# --- Feature Groups (for group-specific normalization) ---
# See configs/preprocessing.yaml for normalization settings per group.
# Groups: volume, count, histogram, top4, timing, timestamp, categorical,
#         rank_id, conditional_size, indicator, ratio, derived_absolute, metadata

# --- System Constants (Polaris-specific, for reference) ---
system:
  name: "ALCF Polaris"
  filesystem: "Eagle/Grand Lustre"
  peak_bandwidth_gb_s: 650
  num_osts: 160
  num_mdts: 40
