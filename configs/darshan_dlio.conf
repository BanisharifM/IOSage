# Darshan configuration for DLIO benchmark
# Excludes Python library I/O to capture actual data file access
# See: https://darshan.readthedocs.io/en/stable/darshan-runtime/doc/darshan-runtime.html

# Increase module memory to handle many data files
MODMEM 16

# Increase max records per module (DLIO opens hundreds/thousands of data files)
MAX_RECORDS 8192 POSIX
MAX_RECORDS 8192 STDIO

# Exclude Python/conda/system library paths
# These consume all record slots with .so/.pyc opens before data files are accessed
NAME_EXCLUDE ^/projects/bdau/envs
NAME_EXCLUDE ^/sw/external
NAME_EXCLUDE ^/sw/spack
NAME_EXCLUDE ^/sw/rh9
NAME_EXCLUDE ^/usr/lib
NAME_EXCLUDE ^/usr/share
NAME_EXCLUDE ^/lib
NAME_EXCLUDE ^/proc
NAME_EXCLUDE ^/sys
NAME_EXCLUDE ^/dev
NAME_EXCLUDE ^/etc
NAME_EXCLUDE ^/tmp
NAME_EXCLUDE ^/run
NAME_EXCLUDE \.pyc$
NAME_EXCLUDE \.pyo$
